<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Adafruit Uncanny Eyes 1:1 Firmware Renderer (Final V2)</title>
        <style>
            :root {
                --bg: #121212;
                --panel: #1e1e1e;
                --accent: #00d2ff;
                --text: #e0e0e0;
            }
            body {
                font-family: "Segoe UI", Tahoma, sans-serif;
                background: var(--bg);
                color: var(--text);
                margin: 0;
                display: flex;
                height: 100vh;
                overflow: hidden;
            }

            #left {
                width: 30%;
                display: flex;
                flex-direction: column;
                border-right: 1px solid #333;
                background: #181818;
            }
            .header {
                padding: 12px 15px;
                background: #222;
                border-bottom: 1px solid #333;
                font-weight: bold;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 14px;
            }
            textarea {
                flex-grow: 1;
                background: #181818;
                color: #569cd6;
                border: none;
                padding: 15px;
                font-family: "Consolas", monospace;
                font-size: 12px;
                resize: none;
                outline: none;
            }
            .btn {
                background: var(--accent);
                color: #000;
                border: none;
                padding: 6px 12px;
                border-radius: 4px;
                cursor: pointer;
                font-weight: bold;
                font-size: 12px;
                transition: 0.2s;
            }
            .btn:hover {
                background: #5ce1e6;
            }

            #mid {
                width: 30%;
                background: var(--panel);
                border-right: 1px solid #333;
                display: flex;
                flex-direction: column;
            }

            #fileList {
                flex-grow: 0;
                overflow-y: auto;
                padding: 10px;
                border-bottom: 1px solid #333;
                max-height: 150px;
            }

            .file-btn {
                background: #2d2d2d;
                color: #fff;
                border: 1px solid #444;
                padding: 8px 12px;
                margin-bottom: 5px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 12px;
                width: 100%;
                text-align: left;
                transition: 0.2s;
            }
            .file-btn:hover {
                background: #3a3a3a;
                border-color: var(--accent);
            }
            .file-btn.active {
                background: var(--accent);
                color: #000;
                border-color: var(--accent);
            }

            #layerList {
                flex-grow: 1;
                overflow-y: auto;
                padding: 10px;
            }

            .layer-card {
                background: #2d2d2d;
                padding: 10px;
                margin-bottom: 10px;
                border-radius: 6px;
                border-left: 4px solid #555;
                position: relative;
            }
            .layer-card.active {
                border-left-color: var(--accent);
                background: #333;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            }
            .drag-handle {
                cursor: grab;
                color: #888;
                margin-right: 5px;
                font-size: 16px;
                user-select: none;
            }

            .params {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                font-size: 11px;
                color: #aaa;
                margin-top: 8px;
            }
            .params label {
                display: flex;
                flex-direction: column;
            }
            .params select {
                background: #111;
                color: #fff;
                border: 1px solid #444;
                padding: 4px;
                border-radius: 3px;
                font-family: monospace;
                margin-top: 3px;
            }

            #right {
                flex-grow: 1;
                display: flex;
                flex-direction: column;
                background: #0a0a0a;
                position: relative;
            }
            .fw-controls {
                padding: 15px;
                background: #222;
                border-bottom: 1px solid #333;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
                font-size: 12px;
            }
            .fw-controls label {
                display: flex;
                flex-direction: column;
                gap: 5px;
            }
            .fw-controls input[type="range"] {
                width: 100%;
                cursor: pointer;
            }
            .fw-controls input[type="number"],
            .fw-controls input[type="color"] {
                background: #111;
                color: #fff;
                border: 1px solid #444;
                padding: 3px;
                border-radius: 3px;
            }

            .canvas-bg {
                flex-grow: 1;
                display: flex;
                justify-content: center;
                align-items: center;
                background: repeating-conic-gradient(
                        #1a1a1a 0% 25%,
                        #222 0% 25% 50%
                    )
                    50% / 20px 20px;
                overflow: hidden;
                position: relative;
            }
            .screen-container {
                position: relative;
                box-shadow:
                    0 10px 40px rgba(0, 0, 0, 0.9),
                    inset 0 0 20px rgba(0, 0, 0, 0.9);
                border: 2px solid #555;
                overflow: hidden;
                background: #000;
            }
            canvas {
                display: block;
                image-rendering: pixelated;
            }

            .status-bar {
                padding: 8px;
                background: var(--accent);
                color: #000;
                font-size: 12px;
                text-align: center;
                font-weight: bold;
            }

            .lang-switch {
                position: absolute;
                top: 10px;
                right: 10px;
                z-index: 1000;
            }
            .lang-btn {
                background: rgba(0, 0, 0, 0.7);
                color: #fff;
                border: 1px solid var(--accent);
                padding: 5px 10px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 11px;
                margin-left: 5px;
            }
            .lang-btn:hover {
                background: var(--accent);
                color: #000;
            }
        </style>
    </head>
    <body>
        <div class="lang-switch">
            <button class="lang-btn" onclick="setLanguage('en')">EN</button>
            <button class="lang-btn" onclick="setLanguage('zh')">中文</button>
        </div>

        <div id="left">
            <div class="header">
                <span data-i18n="header_title">C/C++ Header (.h)</span>
                <button class="btn" onclick="parseCode()" data-i18n="btn_parse">Compile & Parse 🚀</button>
            </div>
            <textarea
                id="codeInput"
                placeholder="Paste code containing sclera, polar/iris, upper, lower..."
            ></textarea>
        </div>

        <div id="mid">
            <div class="header" style="font-size: 13px; color: #ccc" data-i18n="header_files">
                Available Header Files
            </div>
            <div id="fileList"></div>

            <div class="header" style="font-size: 13px; color: #ccc" data-i18n="header_layers">
                Memory Layer Mount (Drag ☰ to Sort)
            </div>
            <div id="layerList"></div>
        </div>

        <div id="right">
            <div class="fw-controls">
                <label
                    >Hardware LCD Resolution:
                    <div style="display: flex; gap: 5px; align-items: center">
                        <input
                            type="number"
                            id="lcdW"
                            value="160"
                            style="width: 50px"
                            onchange="updateScreen()"
                        />
                        x
                        <input
                            type="number"
                            id="lcdH"
                            value="160"
                            style="width: 50px"
                            onchange="updateScreen()"
                        />
                        <input
                            type="checkbox"
                            id="centerViewport"
                            checked
                            onchange="updateScreen()"
                        />
                        Center Logical Viewport
                    </div>
                </label>
                <label
                    >Eyelid (Skin) Color:
                    <input
                        type="color"
                        id="skinColor"
                        value="#000000"
                        onchange="drawComposite()"
                    />
                </label>

                <label>
                    <div style="display: flex; justify-content: space-between">
                        <span>Gaze X Offset</span>
                        <span id="valGx">0 px</span>
                    </div>
                    <input
                        type="range"
                        id="gazeX"
                        min="-50"
                        max="50"
                        value="0"
                        oninput="updateVal(this, 'valGx', ' px'); drawComposite()"
                    />
                </label>
                <label>
                    <div style="display: flex; justify-content: space-between">
                        <span>Gaze Y Offset</span>
                        <span id="valGy">0 px</span>
                    </div>
                    <input
                        type="range"
                        id="gazeY"
                        min="-50"
                        max="50"
                        value="0"
                        oninput="updateVal(this, 'valGy', ' px'); drawComposite()"
                    />
                </label>

                <label>
                    <div style="display: flex; justify-content: space-between">
                        <span>Blink Openness</span>
                        <span id="valBlink">100%</span>
                    </div>
                    <input
                        type="range"
                        id="blinkOpen"
                        min="0.0"
                        max="1.0"
                        step="0.01"
                        value="1.0"
                        oninput="updateVal(this, 'valBlink', '%', true); drawComposite()"
                    />
                </label>
                <label>
                    <div style="display: flex; justify-content: space-between">
                        <span>Iris Scale</span>
                        <span id="valIrisScale">0.5</span>
                    </div>
                    <input
                        type="range"
                        id="irisScale"
                        min="0.1"
                        max="1.5"
                        step="0.05"
                        value="0.5"
                        oninput="updateVal(this, 'valIrisScale', ''); drawComposite()"
                    />
                </label>

                <label>
                    <div style="display: flex; justify-content: space-between">
                        <span>Pupil Size</span>
                        <span id="valPupil">0.5</span>
                    </div>
                    <input
                        type="range"
                        id="pupilScale"
                        min="0.1"
                        max="0.9"
                        step="0.01"
                        value="0.5"
                        oninput="updateVal(this, 'valPupil', ''); drawComposite()"
                    />
                </label>
                <label>
                    <div style="display: flex; justify-content: space-between">
                        <span>Pupil Shape (1=Round, <1=Cat)</span>
                        <span id="valSlit">1.0</span>
                    </div>
                    <input
                        type="range"
                        id="slitScale"
                        min="0.5"
                        max="1.0"
                        step="0.05"
                        value="1.0"
                        oninput="updateVal(this, 'valSlit', ''); drawComposite()"
                    />
                </label>

                <label style="grid-column: span 2;">
                    <div style="display: flex; align-items: center; gap: 8px; background: #111; padding: 5px; border-radius: 4px; border: 1px solid #444;">
                        <input type="checkbox" id="autoAnimate" onchange="toggleAnimate()" />
                        <b style="color: var(--accent)">Enable Auto Animation</b>

                        <span style="margin-left: 10px;">Speed:</span>
                        <input type="range" id="animSpeed" min="0.1" max="5.0" step="0.1" value="1.0" style="width: 80px;" oninput="updateVal(this, 'valAnimSpeed', 'x')" />
                        <span id="valAnimSpeed" style="width: 30px; text-align:right;">1.0x</span>

                        <input type="range" id="globalZoom" min="1" max="4" step="0.1" value="2.5" oninput="updateScreen()" style="width: 60px; margin-left: auto" title="Global Zoom" />
                    </div>
                </label>
            </div>
            <div class="canvas-bg">
                <div class="screen-container" id="screenCont">
                    <canvas id="cvs" width="160" height="160"></canvas>
                </div>
            </div>
            <div class="status-bar" id="status">Waiting for parsing...</div>
        </div>

        <script>
            let parsedLayers = [];
            let macroDefines = {};
            let draggedIndex = null;
            let animFrameId = null;
            let currentLang = 'en';
            let availableFiles = [];

            const cvs = document.getElementById("cvs");
            const ctx = cvs.getContext("2d");

            const i18n = {
                en: {
                    header_title: "C/C++ Header (.h)",
                    btn_parse: "Compile & Parse 🚀",
                    header_files: "Available Header Files",
                    header_layers: "Memory Layer Mount (Drag ☰ to Sort)",
                    placeholder: "Paste code containing sclera, polar/iris, upper, lower...",
                    status_waiting: "Waiting for parsing...",
                    status_success: "✅ Extraction complete! Found ${count} layer matrices.",
                    alert_no_code: "No code!",
                    lcd_label: "Hardware LCD Resolution:",
                    lcd_center: "Center Logical Viewport",
                    skin_label: "Eyelid (Skin) Color:",
                    gaze_x: "Gaze X Offset",
                    gaze_y: "Gaze Y Offset",
                    blink: "Blink Openness",
                    iris: "Iris Scale",
                    pupil: "Pupil Size",
                    slit: "Pupil Shape (1=Round, <1=Cat)",
                    anim_enable: "Enable Auto Animation",
                    anim_speed: "Speed:",
                    anim_zoom: "Global Zoom",
                    layer_mode: "C++ Memory Parse Mode:",
                    layer_rgb565: "Regular Image Mapping (Sclera)",
                    layer_polar: "Polar Inversion Mapping (Iris)",
                    layer_threshold: "Threshold Mask (Eyelid)"
                },
                zh: {
                    header_title: "C/C++ 头文件 (.h)",
                    btn_parse: "编译并解析 🚀",
                    header_files: "可用头文件列表",
                    header_layers: "内存图层挂载 (拖拽 ☰ 排序)",
                    placeholder: "粘贴含有 sclera, polar/iris, upper, lower 的代码...",
                    status_waiting: "等待解析...",
                    status_success: "✅ 提取完成！提取到 ${count} 个图层矩阵。",
                    alert_no_code: "无代码！",
                    lcd_label: "硬件 LCD 屏幕分辨率:",
                    lcd_center: "居中逻辑视口",
                    skin_label: "眼睑 (皮肤) 底色:",
                    gaze_x: "眼球 X 轴偏移 (Gaze X)",
                    gaze_y: "眼球 Y 轴偏移 (Gaze Y)",
                    blink: "眨眼开合度 (Blink)",
                    iris: "虹膜外圈尺寸 (Iris Scale)",
                    pupil: "瞳孔内圈大小 (Pupil Size)",
                    slit: "瞳孔形状 (1=圆，<1=猫眼)",
                    anim_enable: "开启自动物理动画",
                    anim_speed: "动画倍速:",
                    anim_zoom: "全局放大",
                    layer_mode: "C++ 内存解析模式:",
                    layer_rgb565: "常规图像映射 (Sclera)",
                    layer_polar: "极坐标反演映射 (Iris)",
                    layer_threshold: "阈值判断遮罩 (Eyelid)"
                }
            };

            function setLanguage(lang) {
                currentLang = lang;
                const t = i18n[lang];

                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (t[key]) el.textContent = t[key];
                });

                document.getElementById('codeInput').placeholder = t.placeholder;

                if (parsedLayers.length > 0) {
                    buildUI();
                }

                updateLabels();
            }

            function updateLabels() {
                const t = i18n[currentLang];
                const gxLabel = document.querySelector('label:nth-of-type(3) div span:first-child');
                const gyLabel = document.querySelector('label:nth-of-type(4) div span:first-child');
                if (gxLabel) gxLabel.textContent = t.gaze_x;
                if (gyLabel) gyLabel.textContent = t.gaze_y;
            }

            function updateVal(el, textId, suffix, isPercent = false) {
                document.getElementById(textId).innerText =
                    (isPercent ? Math.round(el.value * 100) : el.value) +
                    suffix;
            }

            function updateScreen() {
                const w = document.getElementById("lcdW").value;
                const h = document.getElementById("lcdH").value;
                const zoom = document.getElementById("globalZoom").value;
                cvs.width = w;
                cvs.height = h;
                document.getElementById("screenCont").style.width =
                    w * zoom + "px";
                document.getElementById("screenCont").style.height =
                    h * zoom + "px";
                cvs.style.width = "100%";
                cvs.style.height = "100%";
                document.getElementById("screenCont").style.borderRadius =
                    w == h ? "50%" : "10%";
                drawComposite();
            }
            updateScreen();

            function evalMath(str, macros) {
                try {
                    let replaced = str.replace(/[A-Za-z0-9_]+/g, (m) =>
                        macros[m] !== undefined ? macros[m] : isNaN(m) ? 1 : m,
                    );
                    return Function('"use strict";return (' + replaced + ")")();
                } catch (e) {
                    return null;
                }
            }

            function decodeRGB565(val) {
                return {
                    r: (((val >> 11) & 0x1f) * 255) / 31,
                    g: (((val >> 5) & 0x3f) * 255) / 63,
                    b: ((val & 0x1f) * 255) / 31,
                };
            }

            function parseCode() {
                const code = document.getElementById("codeInput").value;
                const t = i18n[currentLang];
                if (!code.trim()) return alert(t.alert_no_code);

                parsedLayers = [];
                macroDefines = {};

                const defRegex =
                    /#define\s+([A-Za-z0-9_]+)\s+([0-9a-fA-FxX]+|\d+)/g;
                let m;
                while ((m = defRegex.exec(code)) !== null) {
                    macroDefines[m[1]] = parseInt(m[2]);
                }


                // Auto-update LCD resolution if SCREEN_WIDTH/HEIGHT are defined
                if (macroDefines["SCREEN_WIDTH"] && macroDefines["SCREEN_HEIGHT"]) {
                    document.getElementById("lcdW").value = macroDefines["SCREEN_WIDTH"];
                    document.getElementById("lcdH").value = macroDefines["SCREEN_HEIGHT"];
                    updateScreen();
                }

                const arrRegex =
                    /(?:const\s+)?(uint\d+_t|unsigned\s+char|unsigned\s+short)\s+([A-Za-z0-9_]+)\s*\[\s*([^\]]+)\s*\][^=]*=\s*\{([\s\S]*?)\}/g;

                while ((m = arrRegex.exec(code)) !== null) {
                    const typeStr = m[1],
                        name = m[2],
                        bracketStr = m[3],
                        hexStr = m[4];
                    const data = (hexStr.match(/0[xX][0-9A-Fa-f]+/g) || []).map(
                        (x) => parseInt(x, 16),
                    );
                    if (data.length === 0) continue;

                    let w = null,
                        h = null;
                    if (bracketStr.includes("*")) {
                        const parts = bracketStr
                            .split("*")
                            .map((p) => p.trim());
                        w = evalMath(parts[0], macroDefines);
                        h = evalMath(parts[1], macroDefines);
                        if (
                            parts[0].includes("HEIGHT") ||
                            parts[1].includes("WIDTH")
                        ) {
                            let t = w;
                            w = h;
                            h = t;
                        }
                    } else {
                        const val = evalMath(bracketStr, macroDefines);
                        w = h = Math.floor(Math.sqrt(val || data.length));
                    }

                    let renderType = typeStr.includes("16") ? "RGB565" : "MASK";
                    let enabled = true;
                    const nLow = name.toLowerCase();

                    if (nLow.includes("polar") || nLow.includes("iris")) {
                        renderType = "POLAR";
                        enabled = true;
                    } else if (nLow.includes("sclera")) renderType = "RGB565";
                    else if (nLow.includes("upper") || nLow.includes("lower"))
                        renderType = "THRESHOLD";

                    if (!w || isNaN(w))
                        w = h = Math.floor(Math.sqrt(data.length));

                    parsedLayers.push({
                        id: name,
                        name: name,
                        type: renderType,
                        w: w,
                        h: h,
                        data: data,
                        enabled: enabled,
                    });
                }

                const getOrder = (n, t) => {
                    n = n.toLowerCase();
                    if (n.includes("sclera")) return 1;
                    if (n.includes("iris") || n.includes("polar")) return 2;
                    if (t === "THRESHOLD") return 3;
                    return 4;
                };
                parsedLayers.sort(
                    (a, b) =>
                        getOrder(a.name, a.type) - getOrder(b.name, b.type),
                );

                buildUI();
                drawComposite();
                document.getElementById("status").innerText =
                    t.status_success.replace('${count}', parsedLayers.length);
            }

            function buildUI() {
                const list = document.getElementById("layerList");
                list.innerHTML = "";

                const t = i18n[currentLang];

                parsedLayers.forEach((l, i) => {
                    const div = document.createElement("div");
                    div.className = `layer-card ${l.enabled ? "active" : ""}`;
                    div.draggable = true;
                    div.ondragstart = (e) => {
                        draggedIndex = i;
                        e.dataTransfer.effectAllowed = "move";
                    };
                    div.ondragover = (e) => {
                        e.preventDefault();
                    };
                    div.ondrop = (e) => {
                        e.preventDefault();
                        if (draggedIndex !== null && draggedIndex !== i) {
                            const item = parsedLayers.splice(
                                draggedIndex,
                                1,
                            )[0];
                            parsedLayers.splice(i, 0, item);
                            buildUI();
                            drawComposite();
                        }
                    };

                    div.innerHTML = `
            <div style="display:flex; align-items:center; color:#fff; font-weight:bold; font-size:14px; margin-bottom:5px;">
                <span class="drag-handle">☰</span>
                <input type="checkbox" onchange="parsedLayers[${i}].enabled=this.checked; buildUI(); drawComposite();" ${l.enabled ? "checked" : ""} style="margin-right:8px;">
                ${l.name} <span style="font-size:10px; color:#888; font-weight:normal; margin-left:5px;">[${l.w}x${l.h}]</span>
            </div>
            <div class="params">
                <label style="grid-column: span 2;">${t.layer_mode}
                    <select onchange="parsedLayers[${i}].type=this.value; drawComposite();">
                        <option value="RGB565" ${l.type === "RGB565" ? "selected" : ""}>${t.layer_rgb565}</option>
                        <option value="POLAR" ${l.type === "POLAR" ? "selected" : ""}>${t.layer_polar}</option>
                        <option value="THRESHOLD" ${l.type === "THRESHOLD" ? "selected" : ""}>${t.layer_threshold}</option>
                    </select>
                </label>
            </div>
        `;
                    list.appendChild(div);
                });
            }

            async function loadHeaderFile(filename) {
                try {
                    const response = await fetch(`data/${filename}`);
                    if (!response.ok) throw new Error('File not found');
                    const code = await response.text();

                    document.getElementById('codeInput').value = code;

                    document.querySelectorAll('.file-btn').forEach(btn => {
                        btn.classList.remove('active');
                        if (btn.textContent === filename) {
                            btn.classList.add('active');
                        }
                    });

                    parseCode();
                } catch (error) {
                    console.error('Error loading file:', error);
                    alert('Failed to load file: ' + filename);
                }
            }

            async function scanDataDirectory() {
                const fileList = document.getElementById('fileList');
                fileList.innerHTML = '';

                const files = [
                    'catEye.h',
                    'defaultEye.h',
                    'goatEye.h',
                    'logo.h',
                    'naugaEye.h',
                    'newtEye.h',
                    'owlEye.h',
                    'terminatorEye.h'
                ];

                availableFiles = files;

                files.forEach(filename => {
                    const btn = document.createElement('button');
                    btn.className = 'file-btn';
                    btn.textContent = filename;
                    btn.onclick = () => loadHeaderFile(filename);
                    fileList.appendChild(btn);
                });
            }

            async function drawComposite() {
                const sw = parseInt(document.getElementById("lcdW").value);
                const sh = parseInt(document.getElementById("lcdH").value);
                const useCenter =
                    document.getElementById("centerViewport").checked;

                const logicalW = macroDefines["SCREEN_WIDTH"] || 128;
                const logicalH = macroDefines["SCREEN_HEIGHT"] || 128;

                ctx.fillStyle = document.getElementById("skinColor").value;
                ctx.fillRect(0, 0, sw, sh);

                const skinHex = document.getElementById("skinColor").value;
                const sr = parseInt(skinHex.substr(1, 2), 16),
                    sg = parseInt(skinHex.substr(3, 2), 16),
                    sb = parseInt(skinHex.substr(5, 2), 16);

                const baseIrisRadius = macroDefines["IRIS_HEIGHT"] || 45;
                const irisScaleUI = parseFloat(document.getElementById("irisScale").value);
                const irisRadius = baseIrisRadius * irisScaleUI;

                const pScale = parseFloat(document.getElementById("pupilScale").value);
                const slitScale = parseFloat(document.getElementById("slitScale").value);
                const pupilRadius = irisRadius * pScale;

                const gx = parseInt(document.getElementById("gazeX").value);
                const gy = parseInt(document.getElementById("gazeY").value);

                let openness = parseFloat(document.getElementById("blinkOpen").value);

                let tracking_uT = 120 + (gy * 1.5);
                tracking_uT = Math.max(0, Math.min(255, tracking_uT));

                let s = openness;
                let uT = Math.floor(tracking_uT * s + 254 * (1.0 - s));
                let lT = Math.floor((254 - tracking_uT) * s + 254 * (1.0 - s));

                const screenData = ctx.createImageData(sw, sh);
                const offsetX = useCenter ? Math.floor((sw - logicalW) / 2) : 0;
                const offsetY = useCenter ? Math.floor((sh - logicalH) / 2) : 0;

                const scleraLayer = parsedLayers.find(
                    (l) => l.enabled && l.type === "RGB565",
                );
                const polarLayers = parsedLayers.filter(
                    (l) => l.enabled && l.type === "POLAR",
                );
                const maskLayers = parsedLayers.filter(
                    (l) => l.enabled && l.type === "THRESHOLD",
                );

                for (let y = 0; y < sh; y++) {
                    for (let x = 0; x < sw; x++) {
                        const idx = (y * sw + x) * 4;
                        let eyeX = x - offsetX;
                        let eyeY = y - offsetY;

                        if (
                            eyeX < 0 ||
                            eyeX >= logicalW ||
                            eyeY < 0 ||
                            eyeY >= logicalH
                        ) {
                            screenData.data[idx] = sr;
                            screenData.data[idx + 1] = sg;
                            screenData.data[idx + 2] = sb;
                            screenData.data[idx + 3] = 255;
                            continue;
                        }

                        let isSkin = false;
                        for (let m of maskLayers) {
                            let val = m.data[eyeY * m.w + eyeX] & 0xff;
                            let nLower = m.name.toLowerCase();

                            if (nLower.includes("upper")) {
                                if (val <= uT) { isSkin = true; break; }
                            } else if (nLower.includes("lower")) {
                                if (val <= lT) { isSkin = true; break; }
                            } else {
                                if (val <= (255 - Math.floor(s * 255))) { isSkin = true; break; }
                            }
                        }

                        if (isSkin) {
                            screenData.data[idx] = sr;
                            screenData.data[idx + 1] = sg;
                            screenData.data[idx + 2] = sb;
                            screenData.data[idx + 3] = 255;
                            continue;
                        }

                        let r = 0, g = 0, b = 0;

                        if (scleraLayer) {
                            let sx =
                                eyeX -
                                gx +
                                Math.floor((scleraLayer.w - logicalW) / 2);
                            let sy =
                                eyeY -
                                gy +
                                Math.floor((scleraLayer.h - logicalH) / 2);
                            sx = Math.max(0, Math.min(sx, scleraLayer.w - 1));
                            sy = Math.max(0, Math.min(sy, scleraLayer.h - 1));
                            const val =
                                scleraLayer.data[sy * scleraLayer.w + sx];
                            const rgb = decodeRGB565(val);
                            r = rgb.r;
                            g = rgb.g;
                            b = rgb.b;
                        }

                        const cx = logicalW / 2;
                        const cy = logicalH / 2;
                        let dy = eyeY - cy - gy;
                        let dx = eyeX - cx - gx;
                        let d = Math.sqrt(
                            (dx / slitScale) * (dx / slitScale) + dy * dy,
                        );

                        if (polarLayers.length > 0 && d <= irisRadius) {
                            if (d < pupilRadius) {
                                screenData.data[idx] = sr;
                                screenData.data[idx + 1] = sg;
                                screenData.data[idx + 2] = sb;
                                screenData.data[idx + 3] = 0;
                            } else {
                                const pLayer = polarLayers[0];
                                let theta = Math.atan2(dy, dx);
                                if (theta < 0) theta += 2 * Math.PI;

                                let px = Math.floor(
                                    (theta / (2 * Math.PI)) * pLayer.w,
                                );
                                let py = Math.floor(
                                    ((d - pupilRadius) * pLayer.h) /
                                        (irisRadius - pupilRadius),
                                );
                                px = Math.max(0, Math.min(px, pLayer.w - 1));
                                py = Math.max(0, Math.min(py, pLayer.h - 1));

                                const val = pLayer.data[py * pLayer.w + px];
                                const rgb = decodeRGB565(val);
                                r = rgb.r; g = rgb.g; b = rgb.b;
                            }
                        }

                        screenData.data[idx] = r;
                        screenData.data[idx + 1] = g;
                        screenData.data[idx + 2] = b;
                        screenData.data[idx + 3] = 255;
                    }
                }

                ctx.putImageData(screenData, 0, 0);
            }

            let animActive = false;
            let curGx = 0, curGy = 0, targetGx = 0, targetGy = 0;
            let blinkPhase = 0;
            let curOpenness = 1.0;

            function toggleAnimate() {
                animActive = document.getElementById("autoAnimate").checked;
                if (animActive) requestAnimationFrame(animLoop);
                else {
                    document.getElementById("gazeX").value = 0;
                    document.getElementById("gazeY").value = 0;
                    document.getElementById("blinkOpen").value = 1.0;
                    updateVal(document.getElementById("gazeX"), "valGx", " px");
                    updateVal(document.getElementById("gazeY"), "valGy", " px");
                    updateVal(
                        document.getElementById("blinkOpen"),
                        "valBlink",
                        "%",
                        true,
                    );
                    drawComposite();
                }
            }

            function animLoop() {
                if (!animActive) return;

                let speed = parseFloat(document.getElementById("animSpeed").value);

                if (Math.random() < 0.03 * speed) {
                    targetGx = (Math.random() - 0.5) * 60;
                    targetGy = (Math.random() - 0.5) * 60;
                }
                curGx += (targetGx - curGx) * 0.15 * speed;
                curGy += (targetGy - curGy) * 0.15 * speed;

                if (blinkPhase === 0 && Math.random() < 0.015 * speed) blinkPhase = 1;

                if (blinkPhase === 1) {
                    curOpenness -= 0.35 * speed;
                    if (curOpenness <= 0) {
                        curOpenness = 0;
                        blinkPhase = 2;
                    }
                } else if (blinkPhase === 2) {
                    curOpenness += 0.2 * speed;
                    if (curOpenness >= 1.0) {
                        curOpenness = 1.0;
                        blinkPhase = 0;
                    }
                }

                if (Math.random() < 0.05 * speed) {
                    let pScale = parseFloat(
                        document.getElementById("pupilScale").value,
                    );
                    let targetP = pScale + (Math.random() - 0.5) * 0.05;
                    document.getElementById("pupilScale").value = Math.max(
                        0.1,
                        Math.min(targetP, 0.6),
                    );
                    updateVal(
                        document.getElementById("pupilScale"),
                        "valPupil",
                        "",
                    );
                }

                document.getElementById("gazeX").value = curGx;
                document.getElementById("gazeY").value = curGy;
                document.getElementById("blinkOpen").value = curOpenness;
                updateVal(document.getElementById("gazeX"), "valGx", " px");
                updateVal(document.getElementById("gazeY"), "valGy", " px");
                updateVal(
                    document.getElementById("blinkOpen"),
                    "valBlink",
                    "%",
                    true,
                );

                drawComposite();
                requestAnimationFrame(animLoop);
            }

            scanDataDirectory();
            setLanguage('en');
        </script>
    </body>
</html>
